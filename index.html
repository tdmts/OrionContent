<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0e14;
        }

        .frame-wrap {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>

<body>

    <!-- ============================================================ -->
    <!--  EDIT ONLY THIS URL per Brightspace topic:                   -->
    <!-- ============================================================ -->
    <div class="frame-wrap">
        <iframe src="https://tdmts.github.io/OrionCSS/example.html" allowfullscreen></iframe>
    </div>

</body>

</html>
